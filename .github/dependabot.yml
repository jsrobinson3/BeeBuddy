version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/apps/mobile"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      expo:
        patterns: ["expo*", "@expo/*", "react-native*"]
      tanstack:
        patterns: ["@tanstack/*"]
      react:
        patterns: ["react", "react-dom", "react-test-renderer"]
      testing:
        patterns: ["jest", "jest-expo", "@testing-library/*", "@types/jest"]
      misc-deps:
        exclude-patterns: ["expo*", "@expo/*", "react-native*", "@tanstack/*",
          "react", "react-dom", "react-test-renderer", "jest", "jest-expo",
          "@testing-library/*", "@types/jest"]

  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
