name: Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly scan on Monday at 06:00 UTC
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-fs:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — Python dependencies
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: apps/api
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

      - name: Trivy — Node dependencies
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: apps/mobile
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

  trivy-image:
    name: Container Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t beebuddy-api:ci apps/api

      - name: Trivy — API image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: beebuddy-api:ci
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

  trivy-config:
    name: IaC / Misconfig Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — Dockerfile & Compose
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0
          format: table

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trivy — Secret scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: 1
          format: table
