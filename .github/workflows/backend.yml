name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/backend.yml"
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/backend.yml"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - run: uv sync --frozen --dev
      - run: uv run ruff check .

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: beebuddy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: testing
          MINIO_ROOT_PASSWORD: testing1
          MINIO_DEFAULT_BUCKETS: test-bucket
        ports:
          - 9000:9000

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/beebuddy
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key
      COOKIE_SECURE: "false"
      EMAIL_SUPPRESS: "true"
      EMAIL_FROM_ADDRESS: noreply@test.beebuddy.app
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing1
      S3_BUCKET: test-bucket
      S3_ENDPOINT_URL: http://localhost:9000
      S3_PUBLIC_URL: http://localhost:9000
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://localhost:11434
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:3000"]'
      RATE_LIMIT_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run database migrations
        run: uv run alembic upgrade head

      - name: Start API server
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for API to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1 || \
               curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1 || \
               curl -sf http://localhost:8000/docs > /dev/null 2>&1; then
              echo "API is ready!"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done

      - name: Run tests
        run: uv run pytest -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: apps/api/test-results.xml
